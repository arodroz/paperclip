# Coolify deployment of Paperclip.
# Builds the server image from upstream paperclipai/paperclip pinned at a commit
# via Docker Compose's remote git build context. This repo owns only the
# deploy config; the app source stays at upstream.
#
# Uses the shared Coolify Postgres instance (bokc0gko8g0s4g0sgs484s00) on
# database 'paperclip' with user 'paperclip'. To reach Postgres (which lives
# on the coolify Docker network), this service joins the coolify network as
# an external attachment and addresses Postgres by its container-UUID hostname.
#
# Bump upstream by editing the build.context ref fragment, commit, redeploy.

services:
  server:
    build:
      # Pinned to post-tag commit that includes Dockerfile fix for gh install.
      # Tag v2026.416.0 had a stale github-cli keyring sha256; fixed later the
      # same day in 407e76c, which e93e418 includes.
      context: https://github.com/paperclipai/paperclip.git#e93e418cbf7997a29ff258d51d761572e69bda92
      dockerfile: Dockerfile
    expose:
      - "3100"
    environment:
      # Coolify magic var: generates Traefik labels for this service on port 3100.
      SERVICE_FQDN_SERVER_3100: "https://paperclip.home.anteras.org"
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL must be set}"
      PORT: "3100"
      HOST: "0.0.0.0"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "https://paperclip.home.anteras.org"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:?OPENROUTER_API_KEY must be set}"
      OPENAI_BASE_URL: "https://openrouter.ai/api/v1"
    volumes:
      - paperclip-data:/paperclip
    networks:
      - default
      - coolify
    labels:
      # Tell Coolify-attached Traefik which network to route backend traffic on.
      # We join multiple networks (per-app + coolify for DB access); without
      # this hint, Traefik may try the wrong interface and return 503.
      - "traefik.docker.network=coolify"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 6g

volumes:
  paperclip-data:

networks:
  coolify:
    external: true
    name: coolify
