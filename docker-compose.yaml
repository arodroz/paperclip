# Coolify deployment of Paperclip.
# Builds the server image from upstream paperclipai/paperclip pinned at a commit
# via Docker Compose's remote git build context. This repo owns only the
# deploy config; the app source stays at upstream.
#
# Topology: Paperclip runs on gpu-server (192.168.1.65). Public Traefik runs
# on the Coolify localhost server (192.168.1.34). Because Traefik labels on a
# container don't cross Docker hosts, we do two cross-host things:
#   1. Publish 3100 on gpu-server's host so the port is reachable from the LAN.
#   2. Add a dynamic Traefik YAML on the localhost proxy routing
#      paperclip.home.anteras.org -> http://192.168.1.65:3100 (managed in
#      Coolify UI: Servers > localhost > Proxy > Dynamic Configurations).
#
# DB connectivity: the shared Coolify Postgres (bokc0gko8g0s4g0sgs484s00)
# lives on the coolify Docker network on gpu-server. We attach to that network
# so DATABASE_URL can use the container-UUID hostname over the internal net.
#
# Bump upstream by editing the build.context ref fragment, commit, redeploy.

services:
  server:
    build:
      # Pinned to post-tag commit that includes Dockerfile fix for gh install.
      # Tag v2026.416.0 had a stale github-cli keyring sha256; fixed later the
      # same day in 407e76c, which e93e418 includes.
      context: https://github.com/paperclipai/paperclip.git#e93e418cbf7997a29ff258d51d761572e69bda92
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL must be set}"
      PORT: "3100"
      HOST: "0.0.0.0"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "https://paperclip.home.anteras.org"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:?OPENROUTER_API_KEY must be set}"
      OPENAI_BASE_URL: "https://openrouter.ai/api/v1"
    volumes:
      - paperclip-data:/paperclip
    networks:
      - default
      - coolify
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 6g

volumes:
  paperclip-data:

networks:
  coolify:
    external: true
    name: coolify
